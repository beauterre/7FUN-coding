  {
    name: "1. Hello world with variable",
    code: `let greeting = "hello world!";\nprint(greeting);`,

  {

    hint: `nTBE9wnsgRA`
  },
  {
    name: "3. Calculating with variables",
    code: `let x = 5;\nlet y = 4;\nlet z = x*y;\nprint(z);`,
    exercise: `Change the value of x so the output is <strong>21</strong>.`,
    correct: `21`,
    hint: `nTBE9wnsgRA`
  },
  {
    name: "4. Why is 8 scared of 7?",
    code: `let eight="ate";\n\nlet goof = 5;\ngoof = goof + 1;\nprint(goof);\n\nprint(eight);\n\nlet boop = 3;\nboop = boop + goof;\nprint(boop);`,
    exercise: `Change the code so the output is <strong>7\nate\n9</strong>.`,
    correct: `7\nate\n9`,
    hint: `nTBE9wnsgRA`
  },,
  {
    name: "5. Update variable with += ",
    code: `let y = 3;\ny +=  9;\nprint(y);`,

  {
    name: "6. Increment operator (++)",

  },
  {
    name: "7. Decrement variable",
    code: `let a = 7;\na/=5;\nprint(a);`,

  },
  {
