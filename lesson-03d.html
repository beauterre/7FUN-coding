    code: `let fruits = ["apple", "banana", "cherry"];\nprint(fruits);`,

  {

    hint: `nTBE9wnsgRA`
  },
  {
    name: "8. Funny array example",
    code: `let boops = ["meh", "ok", "yay"];\nprint(boops);`,

];
