const examples = [
  {
    name: "1. Simple for loop",
    code: `for(let i=1; i<=5; i++){\n  print(i);\n}`,

    hint: `nTBE9wnsgRA`

  {
    name: "2. While loop",

    correct: `10\n9\n8\n7\n6`,
    hint: `nTBE9wnsgRA`
  },
  {
    name: "3. Looping through arrays (for)",
    code: `let fruits = ["apple","banana","cherry"];\nfor(let i=0;i<fruits.length;i++){\n  print(fruits[i]);\n}`,

    hint: `nTBE9wnsgRA`
  },
  {
    name: "4. Pop last element",
    code: `let pets = ["cat","dog","hamster"];\npets.pop();\nprint(pets);`,

    correct: `cat,dog`,
    hint: `nTBE9wnsgRA`
  },
  {
    name: "5. Shift first element",

    hint: `nTBE9wnsgRA`

  {
